name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: macos-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
          
      - name: Build Release
        run: |
          set -e  # Exit on error
          
          # Clean build
          echo "🧹 Cleaning previous builds..."
          xcodebuild clean -scheme GitPeek \
            -destination 'platform=macOS' || {
            echo "❌ Failed to clean build"
            exit 1
          }
          
          # Build the app (Universal Binary for both Intel and Apple Silicon)
          echo "🔨 Building Universal Binary..."
          xcodebuild -scheme GitPeek \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            build || {
            echo "❌ Build failed"
            exit 1
          }
          
          echo "✅ Build successful"
            
      - name: Create App Bundle
        run: |
          # Find the built executable
          EXECUTABLE_PATH="build/Build/Products/Release/GitPeek"
          
          # Create app bundle structure
          mkdir -p "GitPeek.app/Contents/MacOS"
          mkdir -p "GitPeek.app/Contents/Resources"
          mkdir -p "GitPeek.app/Contents/Frameworks"
          
          # Copy executable
          cp "$EXECUTABLE_PATH" "GitPeek.app/Contents/MacOS/GitPeek"
          
          # Copy Sparkle framework
          if [ -d "build/Build/Products/Release/Sparkle.framework" ]; then
            echo "📦 Copying Sparkle framework..."
            cp -R "build/Build/Products/Release/Sparkle.framework" "GitPeek.app/Contents/Frameworks/"
          else
            echo "⚠️ Sparkle framework not found, checking alternative locations..."
            # Try to find Sparkle in build directory
            find build -name "Sparkle.framework" -type d | head -1 | xargs -I {} cp -R {} "GitPeek.app/Contents/Frameworks/"
          fi
          
          # Create Info.plist
          VERSION="${{ github.ref_name }}"
          cat > "GitPeek.app/Contents/Info.plist" << PLIST_EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GitPeek</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleDisplayName</key>
              <string>GitPeek</string>
              <key>CFBundleIdentifier</key>
              <string>com.gitpeek.GitPeek</string>
              <key>CFBundleName</key>
              <string>GitPeek</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSDesktopFolderUsageDescription</key>
              <string>GitPeek needs access to your Desktop folder to monitor Git repositories stored there.</string>
              <key>NSDocumentsFolderUsageDescription</key>
              <string>GitPeek needs access to your Documents folder to monitor Git repositories stored there.</string>
              <key>NSDownloadsFolderUsageDescription</key>
              <string>GitPeek needs access to your Downloads folder to monitor Git repositories stored there.</string>
              <key>NSRemovableVolumesUsageDescription</key>
              <string>GitPeek needs access to removable volumes to monitor Git repositories stored there.</string>
              <key>SUFeedURL</key>
              <string>https://raw.githubusercontent.com/ryota-kishimoto/gitpeek/main/appcast.xml</string>
              <key>SUEnableAutomaticChecks</key>
              <true/>
              <key>SUScheduledCheckInterval</key>
              <integer>86400</integer>
              <key>SUPublicEDKey</key>
              <string>VuF1RDfpkALoNuceWkjdqQC8tKsTRcPEBgWnD1iIkOY=</string>
          </dict>
          </plist>
          PLIST_EOF
          
          # Copy app icon
          cp Resources/AppIcon.icns "GitPeek.app/Contents/Resources/AppIcon.icns"

          # Make executable
          chmod +x "GitPeek.app/Contents/MacOS/GitPeek"

          # Fix rpath for Sparkle framework
          install_name_tool -add_rpath "@executable_path/../Frameworks" "GitPeek.app/Contents/MacOS/GitPeek" 2>/dev/null || true

          # Sign the app (ad-hoc signing for now)
          codesign --force --deep --sign - "GitPeek.app"
          
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG background
        run: |
          # Convert SVG background to PNG for DMG
          # Use sips to create a simple tiff background if rsvg-convert is not available
          if command -v rsvg-convert &> /dev/null; then
            rsvg-convert -w 600 -h 400 Resources/dmg-background.svg -o dmg-background.png
          else
            # Fallback: use the pre-built PNG
            cp Resources/dmg-background.png dmg-background.png
          fi

      - name: Create DMG
        run: |
          set +e
          create-dmg \
            --volname "GitPeek" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "GitPeek.app" 175 190 \
            --hide-extension "GitPeek.app" \
            --app-drop-link 425 190 \
            --background "dmg-background.png" \
            --text-size 12 \
            --no-internet-enable \
            "GitPeek-${{ github.ref_name }}.dmg" \
            "GitPeek.app"
          EXIT_CODE=$?
          set -e

          # create-dmg exits with 2 when DMG is created but codesigning fails (expected without cert)
          if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 2 ]; then
            echo "DMG creation failed with exit code $EXIT_CODE"
            exit 1
          fi

          echo "DMG created successfully"

          # Generate SHA256
          shasum -a 256 GitPeek-${{ github.ref_name }}.dmg > GitPeek-${{ github.ref_name }}.dmg.sha256
          
      - name: Download and Setup Sparkle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SPARKLE_VERSION=$(gh api repos/sparkle-project/Sparkle/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$SPARKLE_VERSION" ]; then
            echo "Failed to fetch Sparkle version, using fallback"
            SPARKLE_VERSION="2.8.1"
          fi
          echo "Downloading Sparkle ${SPARKLE_VERSION}..."
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o Sparkle.tar.xz
          tar -xf Sparkle.tar.xz
          
      - name: Sign DMG with Sparkle
        id: sparkle_sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          DMG_PATH: GitPeek-${{ github.ref_name }}.dmg
        run: |
          set -eo pipefail

          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "❌ SPARKLE_PRIVATE_KEY secret not configured"
            exit 1
          fi

          echo "✍️ Signing DMG with Sparkle (stdin-fed private key)..."
          SIGNATURE=$(printf '%s' "$SPARKLE_PRIVATE_KEY" | ./bin/sign_update -p --ed-key-file - "$DMG_PATH")

          if [ -z "$SIGNATURE" ]; then
            echo "❌ Sparkle signature output was empty"
            exit 1
          fi

          echo "✅ Signature generated (${#SIGNATURE} chars)"
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"

          FILE_SIZE=$(stat -f%z "$DMG_PATH")
          if [ -z "$FILE_SIZE" ]; then
            echo "❌ Failed to get DMG file size"
            exit 1
          fi

          echo "📏 File size: $FILE_SIZE bytes"
          echo "file_size=$FILE_SIZE" >> "$GITHUB_OUTPUT"
          
      - name: Generate Release Notes
        id: release_notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -eo pipefail

          # Find the previous tag reachable from TAG (excluding TAG itself)
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          {
            if [ -z "$PREV_TAG" ]; then
              echo "First release"
            else
              echo "## What's Changed"
              echo ""
              git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}"
              echo ""
              echo ""
              echo "**Full Changelog**: https://github.com/ryota-kishimoto/gitpeek/compare/${PREV_TAG}...${TAG}"
            fi

            echo ""
            echo "## Installation"
            echo ""
            echo "1. Download \`GitPeek-${TAG}.dmg\`"
            echo "2. Open the DMG file"
            echo "3. Drag GitPeek to your Applications folder"
            echo "4. Launch GitPeek from Applications"
            echo "5. Look for the folder icon in your menu bar"
            echo ""
            echo "## SHA256 Checksum"
            echo '```'
            cat "GitPeek-${TAG}.dmg.sha256"
            echo '```'
          } > release_notes.md

          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: |
            GitPeek-${{ github.ref_name }}.dmg
            GitPeek-${{ github.ref_name }}.dmg.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update appcast.xml
        id: update_appcast
        continue-on-error: true
        env:
          TAG: ${{ github.ref_name }}
          SIGNATURE: ${{ steps.sparkle_sign.outputs.signature }}
          FILE_SIZE: ${{ steps.sparkle_sign.outputs.file_size }}
        run: |
          set -eo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${TAG#v}"
          PUB_DATE=$(date -R)

          cat > new_item.xml <<EOF
                  <item>
                      <title>Version ${VERSION}</title>
                      <description><![CDATA[
                          <h2>What's New</h2>
                          <p>See <a href="https://github.com/ryota-kishimoto/gitpeek/releases/tag/${TAG}">release notes on GitHub</a>.</p>
                      ]]></description>
                      <pubDate>${PUB_DATE}</pubDate>
                      <sparkle:version>${VERSION}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                      <enclosure
                          url="https://github.com/ryota-kishimoto/gitpeek/releases/download/${TAG}/GitPeek-${TAG}.dmg"
                          sparkle:edSignature="${SIGNATURE}"
                          length="${FILE_SIZE}"
                          type="application/octet-stream" />
                  </item>
          EOF

          echo "--- new_item.xml ---"
          cat new_item.xml

          # Remove any existing item block for this version (idempotent re-runs)
          VERSION="$VERSION" python3 <<'PY'
          import os, re
          version = os.environ["VERSION"]
          with open("appcast.xml", "r", encoding="utf-8") as f:
              content = f.read()
          pattern = re.compile(
              r"\s*<item>\s*<title>Version " + re.escape(version) + r"</title>.*?</item>",
              re.DOTALL,
          )
          with open("appcast.xml", "w", encoding="utf-8") as f:
              f.write(pattern.sub("", content))
          PY

          # Insert new item before </channel>
          awk '
            /<\/channel>/ {
              while ((getline line < "new_item.xml") > 0) print line
              close("new_item.xml")
            }
            { print }
          ' appcast.xml > appcast.xml.tmp
          mv appcast.xml.tmp appcast.xml

          echo "--- appcast.xml ---"
          cat appcast.xml

          git add appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast.xml changes to commit"
            exit 0
          fi

          git commit -m "chore: update appcast.xml for ${TAG}"

          if git push origin HEAD:main; then
            echo "✅ appcast.xml pushed to main"
          else
            echo "::warning::Failed to push appcast.xml to main (branch protection). The generated appcast.xml is uploaded as a workflow artifact — download it and push manually."
            exit 1
          fi

      - name: Upload appcast.xml artifact on push failure
        if: steps.update_appcast.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: appcast-xml-${{ github.ref_name }}
          path: appcast.xml
          retention-days: 14